buildscript {
  repositories {
    jcenter()
    google()
  }
  dependencies {
    def ksp_version = '2.3.2'
    classpath 'com.android.tools.build:gradle:4.2.0'
    classpath "com.google.devtools.ksp:com.google.devtools.ksp.gradle.plugin:${ksp_version}"
  }
}

allprojects {
  repositories {
    jcenter()
  }
}
