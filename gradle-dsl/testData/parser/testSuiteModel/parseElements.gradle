android {
  testOptions {
    suites {
      testSuite {
        assets {
        }
        targets {
          'default' {
          }
        }
        useJunitEngine {
          inputs com.android.build.api.dsl.AgpTestSuiteInputParameters.TESTED_APKS
          includeEngines 'test-engine-id'
          enginesDependencies('org.junit.platform:junit-platform-launcher')
          enginesDependencies('org.junit.platform:junit-platform-engine:1.12.0')
          enginesDependencies(libs.junit)
        }
        targetVariants 'debug', 'release'
      }
    }
  }
}
